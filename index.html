<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PepsiMovies</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="profileScreen" class="profile-screen">
    <div class="profile-card">
      <h1>Who’s watching?</h1>
      <p>Pick a profile to continue.</p>
      <div class="profiles">
        <button class="profile-btn" onclick="selectProfile('User 1')">User 1</button>
        <button class="profile-btn" onclick="selectProfile('Guest')">Guest</button>
      </div>
    </div>
  </div>

  <div id="app" class="app" style="display:none;">
    <header class="top-nav" id="topNav">
      <div class="nav-left">
        <h1 class="logo">PepsiMovies</h1>
        <button id="myListNavBtn" class="nav-link">My List</button>
      </div>

      <div class="nav-right">
        <span id="profileName" class="profile-name"></span>
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="Search movies..." />
          <button id="searchBtn">Search</button>
        </div>
      </div>
    </header>

    <main id="mainContent">
      <section class="hero" id="heroSection">
        <iframe id="player" title="Movie player" allowfullscreen frameborder="0"></iframe>
        <div class="hero-overlay">
          <p class="hero-kicker">Featured Movie</p>
          <h2 id="heroTitle">Loading...</h2>
          <p id="heroOverview" class="hero-overview"></p>

          <div class="hero-actions">
            <button id="heroPlayBtn" class="primary-btn">Play</button>
            <button id="heroListBtn" class="secondary-btn">+ My List</button>
            <button id="heroDetailsBtn" class="secondary-btn">Details</button>
          </div>

          <div id="playerStatus" class="player-status"></div>
        </div>
      </section>

      <section id="searchSection" class="category" style="display:none;">
        <h2>Search Results</h2>
        <div id="searchRow" class="row"></div>
      </section>

      <section id="continueSection" class="category">
        <h2>Continue Watching</h2>
        <div id="continueRow" class="row"></div>
      </section>

      <section id="myListSection" class="category">
        <h2>My List</h2>
        <div id="myListRow" class="row"></div>
      </section>

      <section class="category">
        <h2>Popular Movies</h2>
        <div id="popularRow" class="row"></div>
      </section>

      <section class="category">
        <h2>Top Rated</h2>
        <div id="topRatedRow" class="row"></div>
      </section>

      <section class="category">
        <h2>Action</h2>
        <div id="actionRow" class="row"></div>
      </section>

      <section class="category">
        <h2>Horror</h2>
        <div id="horrorRow" class="row"></div>
      </section>

      <section class="category">
        <h2>Comedy</h2>
        <div id="comedyRow" class="row"></div>
      </section>
    </main>
  </div>

  <div id="detailsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <button id="closeModalBtn" class="close-btn" aria-label="Close">✕</button>
      <img id="modalPoster" class="modal-poster" alt="" />
      <div class="modal-body">
        <h3 id="modalTitle"></h3>
        <p id="modalMeta" class="modal-meta"></p>
        <p id="modalOverview" class="modal-overview"></p>
        <div class="modal-actions">
          <button id="modalPlayBtn" class="primary-btn">Play</button>
          <button id="modalListBtn" class="secondary-btn">+ My List</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
