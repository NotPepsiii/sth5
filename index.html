<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Disney UI v2 — My Movie Site</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Recommended CSP (set on server): 
       Content-Security-Policy: default-src 'self'; img-src 'self' https://image.tmdb.org https://via.placeholder.com; frame-src 'self' https://www.youtube.com; script-src 'self'; style-src 'self' 'unsafe-inline';
  -->
</head>
<body>
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a class="logo" href="/" aria-label="Home">
        <svg width="36" height="36" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="#00b0ff"/></svg>
        <span class="brand">My Movie Site</span>
      </a>

      <nav class="primary-nav" role="navigation" aria-label="Primary">
        <button class="nav-btn active" data-section="home" type="button">Home</button>
        <button class="nav-btn" data-section="movies" type="button">Movies</button>
        <button class="nav-btn" data-section="series" type="button">Series</button>
        <button class="nav-btn" data-section="originals" type="button">Originals</button>
        <button class="nav-btn" data-section="kids" type="button">Kids</button>
      </nav>

      <div class="header-actions">
        <div class="search-wrap" role="search">
          <label for="searchInput" class="visually-hidden">Search movies</label>
          <input id="searchInput" type="search" placeholder="Search for a movie, show, or character" aria-label="Search movies" />
        </div>
        <button id="searchBtn" class="btn-primary" type="button" aria-label="Search">Search</button>
        <button id="profileBtn" class="profile-btn" aria-haspopup="true" aria-expanded="false" aria-label="Profile" type="button">
          <img src="https://via.placeholder.com/40?text=U" alt="Profile" />
        </button>
      </div>
    </div>
  </header>

  <main id="main" role="main">
    <section id="hero" class="hero" aria-label="Featured">
      <div class="hero-inner">
        <div class="hero-content">
          <h1 id="heroTitle">Featured</h1>
          <p id="heroOverview">Curated picks and new releases.</p>
          <div class="hero-actions">
            <button id="playHero" class="btn-cta" type="button">Play</button>
            <button id="moreHero" class="btn-ghost" type="button">More Info</button>
          </div>
        </div>
        <div class="hero-art" aria-hidden="true"></div>
      </div>
    </section>

    <section class="rails" aria-label="Content">
      <h2 class="rail-heading">Continue Watching</h2>
      <div class="rail" id="continueRail" tabindex="0" aria-roledescription="carousel"></div>

      <h2 class="rail-heading">Popular Movies</h2>
      <div class="rail" id="popularRail" tabindex="0" aria-roledescription="carousel"></div>

      <h2 class="rail-heading">Trending</h2>
      <div class="rail" id="trendingRail" tabindex="0" aria-roledescription="carousel"></div>
    </section>
  </main>

  <!-- Player modal (user-initiated) -->
  <div id="playerModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-backdrop" data-dismiss="modal"></div>
    <div class="modal-panel" role="document">
      <button class="modal-close" aria-label="Close player" type="button">&times;</button>
      <div id="playerContainer" class="player-container" aria-live="polite"></div>
    </div>
  </div>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <small>© My Movie Site — UI v2</small>
      <nav class="footer-links" aria-label="Footer">
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <a href="#">Help</a>
      </nav>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
