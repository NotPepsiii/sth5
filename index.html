<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Movie Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Movie Site</h1>
    <input id="searchInput" type="text" placeholder="Search for a movie...">
    <button id="searchBtn">Search</button>
  </header>

  <main>
    <section class="left">
      <h2 id="sectionTitle">Popular Movies</h2>
      <div id="movies" class="movie-grid"></div>
    </section>

    <section class="right">
      <h2>Player</h2>
      <iframe
        id="player"
        width="100%"
        height="500"
        allowfullscreen
        frameborder="0">
      </iframe>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
