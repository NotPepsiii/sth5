<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyFlix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-nav">
    <h1 class="logo">MyFlix</h1>

    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Search movies or series...">
      <button id="searchBtn">Search</button>
    </div>
  </header>

  <main>

    <!-- Player Section -->
    <section class="player-section">
      <iframe id="player" allowfullscreen frameborder="0"></iframe>
    </section>

    <!-- Categories -->
    <section class="category">
      <h2>Popular Movies</h2>
      <div id="movies" class="row"></div>
    </section>

    <section class="category">
      <h2>Top Rated</h2>
      <div id="topRated" class="row"></div>
    </section>

    <section class="category">
      <h2>Action</h2>
      <div id="action" class="row"></div>
    </section>

    <section class="category">
      <h2>Horror</h2>
      <div id="horror" class="row"></div>
    </section>

    <section class="category">
      <h2>Comedy</h2>
      <div id="comedy" class="row"></div>
    </section>

    <section class="category">
      <h2>TV Series</h2>
      <div id="series" class="row"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
